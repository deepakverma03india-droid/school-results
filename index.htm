        document.getElementById('captcha-question').innerText = `Security Check: What is ${n1} + ${n2}?`; 
    }
    genCaptcha();

    function attemptLogin() {
        const inputName = document.getElementById('studentName').value.trim().toUpperCase();
        const inputDob = document.getElementById('dob').value;
        const uAns = parseInt(document.getElementById('captcha-answer').value);
        const err = document.getElementById('error-msg');

        if (isNaN(uAns) || uAns !== ans) { 
            err.innerText = "Incorrect Security Answer!"; 
            err.style.display = "block"; 
            genCaptcha(); 
            return; 
        }

        // Logic to find student (Flexible Name Match)
        const s = studentDatabase.find(x => x.name.toUpperCase() === inputName && x.dob === inputDob);
        
        if (s) {
            err.style.display = 'none';
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            document.getElementById('res-name').innerText = s.name;
            document.getElementById('res-remark').innerText = s.remark;
            document.getElementById('res-total').innerText = s.total;
            document.getElementById('res-percentage').innerText = s.per;
            
            const b = document.getElementById('marks-body');
            b.innerHTML = "";
            s.subjects.forEach(sub => {
                b.innerHTML += `<tr>
                    <td style="text-align: left; font-weight: bold;">${sub.n}</td>
                    <td>${sub.t}</td>
                    <td>${sub.p}</td>
                    <td><strong>${sub.tot}</strong></td>
                </tr>`;
            });
        } else {
            err.innerText = "No record found. Check if the Name and DOB match the official sheet."; 
            err.style.display = "block";
            genCaptcha();
        }
    }
